syntax = "proto3";
package conversation;
option go_package = "github.com/openimsdk/protocol/conversation";

import "wrapperspb/wrapperspb.proto";

// SetConversationRetentionDaysReq 设置会话保留天数请求
message SetConversationRetentionDaysReq {
  string conversationID = 1;
  string ownerUserID = 2;
  int64 retentionDays = 3; // 保留天数，0表示使用默认配置
}

// SetConversationRetentionDaysResp 设置会话保留天数响应
message SetConversationRetentionDaysResp {}

// GetConversationRetentionDaysReq 获取会话保留天数请求
message GetConversationRetentionDaysReq {
  string conversationID = 1;
  string ownerUserID = 2;
}

// GetConversationRetentionDaysResp 获取会话保留天数响应
message GetConversationRetentionDaysResp {
  string conversationID = 1;
  int64 retentionDays = 2;      // 实际使用的保留天数
  bool hasCustomSetting = 3;     // 是否有自定义设置
  string setBy = 4;              // 设置者
  int64 setTime = 5;             // 设置时间
}

// AdminSetConversationRetentionDaysReq 管理员设置会话保留天数请求
message AdminSetConversationRetentionDaysReq {
  string conversationID = 1;
  int64 retentionDays = 2;
}

// AdminSetConversationRetentionDaysResp 管理员设置会话保留天数响应
message AdminSetConversationRetentionDaysResp {}

// GetConversationsRetentionReq 获取多个会话保留天数请求
message GetConversationsRetentionReq {
  string ownerUserID = 1;
  repeated string conversationIDs = 2;
}

// ConversationRetention 会话保留信息
message ConversationRetention {
  string conversationID = 1;
  int64 retentionDays = 2;
  bool hasCustomSetting = 3;
  int32 conversationType = 4;
}

// GetConversationsRetentionResp 获取多个会话保留天数响应
message GetConversationsRetentionResp {
  repeated ConversationRetention retentions = 1;
}
